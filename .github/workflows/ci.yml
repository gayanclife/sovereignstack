name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # Pull the toolchain version from go.mod so CI and local builds
      # never drift apart. Resolves to whatever Go major.minor go.mod
      # declares (currently 1.25.x), with security patches.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' locally and commit."
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        # Skip the engine integration tests — they assume a clean Docker
        # environment and the CI runner has containers from earlier jobs.
        run: go test -count=1 -timeout=10m $(go list ./... | grep -v /core/engine)

      - name: Race detector (focused on concurrency-heavy packages)
        run: go test -race -count=1 -timeout=10m ./core/keys/... ./core/gateway/... ./core/audit/...

  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # golangci-lint v1.64.x was built against Go 1.24 and rejects newer
      # go.mod targets. v2.x supports Go 1.25 but requires action v7 — v6
      # only knew about v1 and rejects 'v2.x' as an invalid version.
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0
          args: --timeout=5m
