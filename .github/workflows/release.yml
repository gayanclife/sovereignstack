name: Release

# Triggered by pushing a SemVer tag. v1.0.0 ships Linux/amd64 only.
# macOS and linux/arm64 will return in v1.1.0; the Homebrew tap is
# disabled in .goreleaser.yaml until then.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # GoReleaser needs this to create the GitHub Release
  packages: write

jobs:
  goreleaser:
    name: Build, test, release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # GoReleaser inspects history to build the changelog.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Track go.mod's toolchain directive so the release uses the
          # patched 1.25.x runtime, matching CI.
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          # Built-in token; lets GoReleaser create the Release in this repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
