# GoReleaser config for SovereignStack.
# https://goreleaser.com/customization/
#
# Drives the entire release pipeline: cross-compile binaries, archive
# them, generate checksums, build .deb / .rpm packages, publish to
# GitHub Releases, and update a Homebrew tap.
#
# Triggered by `git tag vX.Y.Z && git push origin vX.Y.Z` — the GitHub
# Actions workflow at .github/workflows/release.yml takes it from there.

version: 2

project_name: sovstack

before:
  hooks:
    - go mod tidy
    # Skip core/engine — its integration tests assume a clean Docker
    # state and can fail when ss-* containers from prior deploys are
    # running. CI applies the same exclusion (.github/workflows/ci.yml).
    - sh -c 'go test -count=1 -timeout=10m $(go list ./... | grep -v /core/engine)'

builds:
  - id: sovstack
    main: .
    binary: sovstack
    env:
      - CGO_ENABLED=1   # required for github.com/mattn/go-sqlite3
    # v1.0.0 ships Linux/amd64 only — the only platform that's been
    # tested. macOS (amd64 + arm64) and linux/arm64 will return in a
    # follow-up minor release once hardware is available to verify on.
    goos:
      - linux
    goarch:
      - amd64
    ignore: []
    # `-s -w` strips symbols and DWARF info — about 30% smaller binary.
    # ldflags inject the version into a `version` package; if you don't
    # have one yet, drop the `-X` lines.
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .CommitDate }}

archives:
  - id: tarball
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - sovstack.yaml.example
      - docs/QUICKSTART.md
    # No format overrides needed — Linux only ships .tar.gz, which is
    # the default. Windows .zip handling will return when we re-add
    # darwin/windows targets.

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

# Linux packages: .deb for apt, .rpm for dnf, plus apk and archlinux.
nfpms:
  - id: sovstack-pkg
    package_name: sovstack
    vendor: SovereignStack
    homepage: https://github.com/sovereignstack/sovereignstack
    maintainer: SovereignStack Maintainers <maintainers@sovereignstack.io>
    description: |-
      SovereignStack — self-hosted LLM serving with auth, quotas, audit,
      and Prometheus metrics. One Go binary, no external dependencies
      beyond Docker for model containers.
    license: Apache-2.0
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    contents:
      - src: sovstack.yaml.example
        dst: /etc/sovstack/sovstack.yaml.example
        type: config
      - src: LICENSE
        dst: /usr/share/doc/sovstack/copyright
      - src: README.md
        dst: /usr/share/doc/sovstack/README.md
      - src: CHANGELOG.md
        dst: /usr/share/doc/sovstack/changelog
    recommends:
      - docker.io
    suggests:
      - redis-server

# Homebrew tap is disabled in v1.0.0 — macOS isn't shipped this release.
# Re-enable in v1.1.0 once macOS binaries are tested. The full block is
# kept below (commented) so the diff to re-enable is one line.
#
# brews:
#   - name: sovstack
#     repository:
#       owner: sovereignstack
#       name: homebrew-tap
#       branch: main
#       token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
#     homepage: https://github.com/sovereignstack/sovereignstack
#     description: Self-hosted LLM serving with auth, quotas, audit, and Prometheus metrics
#     license: Apache-2.0
#     install: |
#       bin.install "sovstack"
#       pkgshare.install "sovstack.yaml.example"
#       doc.install "README.md", "CHANGELOG.md", "LICENSE"
#     test: |
#       assert_match "SovereignStack", shell_output("#{bin}/sovstack --help")
#     caveats: |
#       To get started:
#         sovstack init
#         sovstack --help
#
#       An example config has been installed to:
#         #{HOMEBREW_PREFIX}/share/sovstack/sovstack.yaml.example
#
#       For Docker-backed model deployment, install Docker Desktop or colima.

release:
  github:
    owner: gayanclife
    name: sovereignstack
  draft: false
  prerelease: auto    # marks v1.0.0-rc.1 etc. as prerelease automatically
  name_template: "v{{ .Version }}"
  header: |
    ## SovereignStack {{ .Version }}

    Linux/amd64 only in this initial release. macOS and linux/arm64
    will land in a follow-up minor release.

    See [CHANGELOG.md](https://github.com/gayanclife/sovereignstack/blob/main/CHANGELOG.md) for the full notes.

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'merge conflict'
  groups:
    - title: 'Features'
      regexp: '^.*?(feat)(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: 'Bug fixes'
      regexp: '^.*?(fix)(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: 'Other'
      order: 999
