version: '3.8'

services:
  management:
    build:
      context: .
      dockerfile: Dockerfile.management
    container_name: sovereignstack-management
    ports:
      - "${MANAGEMENT_PORT:-8888}:8888"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ~/.sovereignstack:/root/.sovereignstack:ro
    environment:
      - SOVEREIGNSTACK_LOG_DIR=/root/.sovereignstack/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8888/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
  #   depends_on:
  #     - vllm

  # vllm:
  #   image: vllm/vllm-openai:latest
  #   ports:
  #     - "8000:8000"
