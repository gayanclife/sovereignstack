  #     - ~/.cache/huggingface:/root/.cache/huggingface
  #   environment:
  #     - CUDA_VISIBLE_DEVICES=0
  #     - HF_TOKEN=${HF_TOKEN}
  #   command: --model ${MODEL_NAME} --gpu-memory-utilization 0.9 --host 0.0.0.0 --port 8000
